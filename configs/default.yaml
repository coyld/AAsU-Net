project:
  name: AAsU-Net
  output_dir: outputs/aasunet_default
  seed: 42

data:
  input_channels: 1
  num_classes: 3
  patch_size: [64, 128, 128]
  target_spacing: [3.22, 1.62, 1.62]
  intensity_clip: [-75.0, 293.0]
  zscore: true
  positive_sample_ratio: 0.75
  foreground_labels: [1, 2]
  cache_in_memory: false
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  label_map: {}

augmentation:
  enabled: true
  flip_prob: 0.5
  rotate90_prob: 0.5
  small_rotate_prob: 0.2
  rotate_limit_deg: 15.0
  zoom_prob: 0.2
  zoom_range: [0.9, 1.1]
  brightness_prob: 0.15
  brightness_delta: 0.1
  contrast_prob: 0.15
  contrast_range: [0.9, 1.1]
  gamma_prob: 0.15
  gamma_range: [0.7, 1.5]

model:
  encoder_channels: [24, 48, 96, 192, 320, 320]
  conv_mode: aas
  use_csff: true
  reduction: 4
  leakiness: 0.01
  deep_supervision: true
  dropout: 0.0

loss:
  dice_weight: 1.0
  ce_weight: 1.0
  include_background: true
  deep_supervision_weights: [1.0, 0.5, 0.25, 0.125, 0.0625]

optimizer:
  name: sgd
  lr: 0.01
  momentum: 0.99
  weight_decay: 0.00003
  nesterov: true
  poly_power: 0.9

train:
  epochs: 1000
  batch_size: 2
  iterations_per_epoch: 250
  amp: true
  grad_clip: 12.0
  early_stopping_patience: 20
  checkpoint_every: 20
  resume: null
  output_dir: outputs/aasunet_default
  save_last: true
  log_interval: 20

validation:
  batch_size: 1
  sliding_window_batch: 1
  overlap: 0.5
  use_gaussian: true
  save_predictions: false
  regions: [kidney, tumor]

runtime:
  device: cuda
  benchmark: false
  deterministic: false
  num_threads: null
